<!DOCTYPE html>
<html>
<head>
    <title>Register - Foodly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width:400px;">
        <h2 class="text-center text-danger">Register</h2>
        <form method="POST">
            <input class="form-control mb-3" type="text" name="name" placeholder="Full Name" required>
            <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>
            <button class="btn btn-danger w-100">Register</button>
        </form>
        <a class="text-center mt-3" href="/">Back to Home</a>
    </div>
</div>
</body>
</html>
