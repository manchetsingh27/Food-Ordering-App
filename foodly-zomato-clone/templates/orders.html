<!DOCTYPE html>
<html>
<head>
    <title>My Orders - Foodly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🍕 Foodly</a>
        <a class="btn btn-light btn-sm" href="/">Home</a>
    </div>
</nav>

<div class="container mt-5">
    <h2>My Orders</h2>

    {% for order in orders %}
    <div class="card p-3 mb-3">
        <h5>Order #{{ order.id }}</h5>
        <p><b>Items:</b> {{ order.items }}</p>
        <p><b>Total:</b> ₹{{ order.total }}</p>
        <p><b>Address:</b> {{ order.address }}</p>
        <p><b>Payment:</b> {{ order.payment_id }}</p>
        <p><b>Status:</b> <span class="badge bg-success">{{ order.status }}</span></p>
    </div>
    {% else %}
        <div class="alert alert-info">No orders yet.</div>
    {% endfor %}
</div>
</body>
</html>
