<!DOCTYPE html>
<html>
<head>
    <title>Cart - Foodly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🍕 Foodly</a>
        <a class="btn btn-light btn-sm" href="/">Home</a>
    </div>
</nav>

<div class="container mt-5">
    <h2>🛒 Your Cart</h2>

    {% if items %}
        {% for item in items %}
        <div class="card mb-3 p-3">
            <div class="row align-items-center">
                <div class="col-md-3">
                    <img src="{{ item.image }}" class="img-fluid rounded" style="height:120px; object-fit:cover;">
                </div>
                <div class="col-md-5">
                    <h5>{{ item.name }}</h5>
                    <p>{{ item.restaurant }}</p>
                    <span class="badge bg-secondary">{{ item.category }}</span>
                </div>
                <div class="col-md-2">
                    <h5>₹{{ item.price }}</h5>
                </div>
                <div class="col-md-2">
                    <a href="/add-to-cart/{{ item.id }}" class="btn btn-success btn-sm">+</a>
                    <a href="/remove-from-cart/{{ item.id }}" class="btn btn-danger btn-sm">-</a>
                </div>
            </div>
        </div>
        {% endfor %}

        <div class="card p-4">
            <h3>Total: ₹{{ total }}</h3>
            <a href="/checkout" class="btn btn-danger mt-3">Proceed to Checkout</a>
        </div>
    {% else %}
        <div class="alert alert-warning">Your cart is empty.</div>
    {% endif %}
</div>
</body>
</html>
