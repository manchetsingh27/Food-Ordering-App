<!DOCTYPE html>
<html>
<head>
    <title>Add Food - Foodly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width:500px;">
        <h2 class="text-danger">Add Food Item</h2>

        <form method="POST">
            <input class="form-control mb-3" type="text" name="name" placeholder="Food Name" required>
            <input class="form-control mb-3" type="text" name="restaurant" placeholder="Restaurant Name" required>

            <select class="form-select mb-3" name="category" required>
                <option value="">Select Category</option>
                <option>Pizza</option>
                <option>Burger</option>
                <option>Biryani</option>
                <option>Chinese</option>
                <option>Dessert</option>
            </select>

            <input class="form-control mb-3" type="number" name="price" placeholder="Price" required>
            <input class="form-control mb-3" type="text" name="image" placeholder="Image URL" required>

            <button class="btn btn-danger w-100">Add Food</button>
        </form>

        <a class="text-center mt-3" href="/admin">Back to Admin</a>
    </div>
</div>
</body>
</html>
