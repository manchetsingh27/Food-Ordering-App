<!DOCTYPE html>
<html>
<head>
    <title>Checkout - Foodly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🍕 Foodly</a>
        <a class="btn btn-light btn-sm" href="/cart">Back to Cart</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4">
        <h2>Checkout</h2>

        <h4 class="mt-3">Order Summary</h4>
        {% for item in items %}
            <p>{{ item.name }} - ₹{{ item.price }}</p>
        {% endfor %}

        <h3>Total: ₹{{ total }}</h3>

        <form method="POST" action="/place-order">
            <textarea class="form-control my-3" name="address" placeholder="Enter delivery address" required rows="4"></textarea>
            <button class="btn btn-danger">Place Order - Cash on Delivery</button>
        </form>
    </div>
</div>
</body>
</html>
